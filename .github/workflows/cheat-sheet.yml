name: cheat-sheet

on:
  push:
    branches: [main]
    paths:
      - terminal-cheat-sheet.md
      - .scripts/render-cheat-sheet.py
  pull_request:
    branches: [main]
    paths:
      - terminal-cheat-sheet.md
      - .scripts/render-cheat-sheet.py

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run python .scripts/render-cheat-sheet.py
      - name: Commit updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terminal-cheat-sheet.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate terminal-cheat-sheet.html"
            git push
          fi
