name: cheat-sheet

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - terminal-cheat-sheet.md
      - .scripts/render-cheat-sheet.py
  pull_request:
    branches: [main]
    paths:
      - terminal-cheat-sheet.md
      - .scripts/render-cheat-sheet.py

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run python .scripts/render-cheat-sheet.py
      - name: Commit updated HTML
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terminal-cheat-sheet.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate terminal-cheat-sheet.html"
            git push
          fi
      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - name: Prepare Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p site
          cp terminal-cheat-sheet.html site/index.html
          cp terminal-cheat-sheet.md site/terminal-cheat-sheet.md
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
