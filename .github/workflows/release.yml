# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: resolve_tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag_name="${GITHUB_REF_NAME}"
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag is available locally
        shell: bash
        run: |
          tag_name='${{ steps.resolve_tag.outputs.tag_name }}'
          git fetch --force --tags origin
          git rev-parse "${tag_name}" >/dev/null

      - name: Generate release notes from changelog
        shell: bash
        run: |
          tag_name='${{ steps.resolve_tag.outputs.tag_name }}'

          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found; cannot create release notes" >&2
            exit 1
          fi

          awk -v tag="${tag_name}" '
            BEGIN { in_section=0; found=0 }
            $1 == "##" && $2 == tag && $3 == "-" {
              if ($4 !~ /^[0-9]{4}-[0-9]{2}-[0-9]{2}$/) {
                print "Release heading for " tag " must include ISO date: ## " tag " - YYYY-MM-DD" > "/dev/stderr"
                exit 2
              }
              in_section=1
              found=1
            }
            in_section && $1 == "##" && $2 != tag {
              exit
            }
            in_section {
              print
            }
            END {
              if (!found) {
                print "No changelog section found for " tag " in CHANGELOG.md" > "/dev/stderr"
                exit 1
              }
            }
          ' CHANGELOG.md > release-section.md

          {
            cat release-section.md
            echo
            echo "## Install"
            echo "\`uvx --from git+https://github.com/${GITHUB_REPOSITORY}@${tag_name} terminal-setup\`"
          } > release-notes.md

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag_name }}
          name: ${{ steps.resolve_tag.outputs.tag_name }}
          body_path: release-notes.md
