name: release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: resolve_tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag_name="${GITHUB_REF_NAME}"
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag is available locally
        env:
          TAG_NAME: ${{ steps.resolve_tag.outputs.tag_name }}
        shell: bash
        run: |
          git fetch --force --tags origin
          git rev-parse "${TAG_NAME}" >/dev/null

      - name: Generate brief release notes
        env:
          TAG_NAME: ${{ steps.resolve_tag.outputs.tag_name }}
        shell: bash
        run: |
          prev_tag="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"
          if [ -n "${prev_tag}" ]; then
            range="${prev_tag}..${TAG_NAME}"
          else
            range="${TAG_NAME}"
          fi

          {
            echo "## Changes"
            if [ "$(git rev-list --count "${range}")" -gt 0 ]; then
              git log --no-merges --pretty='- %s (`%h`)' "${range}"
            else
              echo "- Initial release"
            fi
            echo
            echo "## Install"
            echo "\`uvx --from git+https://github.com/${GITHUB_REPOSITORY}@${TAG_NAME} terminal-setup\`"
          } > release-notes.md

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag_name }}
          name: ${{ steps.resolve_tag.outputs.tag_name }}
          body_path: release-notes.md
