# Starship prompt configuration.
# Inspired by https://github.com/josean-dev/dev-environment-files
# This file is generated by terminal-setup; edit the template in the repo.

format = """
$username$hostname$directory$git_branch$git_status$cmd_duration$line_break$character"""

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[cmd_duration]
min_time = 500
format = "took [$duration](yellow) "

[git_branch]
symbol = ""
format = "[$branch]($style) "

[git_status]
format = "([$all_status$ahead_behind]($style)) "
