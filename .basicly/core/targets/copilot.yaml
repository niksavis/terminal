name: copilot
enabled: true
tone: concise_checklist
# Soft, non-blocking warning on `basicly build` (not a gate). The baseline is
# ~50 chars/line, so this fires ~1000 chars before the ~200-line (~10000-char)
# point where always-on context starts to dilute attention. Codex sits higher
# (12000) because it inlines scoped fragments.
max_size_warning: 9000
outputs:
  copilot_baseline:
    path: .github/copilot-instructions.md
    template: copilot/copilot_instructions_md.j2
    filter:
      applies_to: [all, copilot]
      exclude_scoped: true
# Scoped fragments are single-sourced to .claude/rules/ (claude target): VS Code
# loads both roots without dedup, so a .github/instructions/ twin double-loads.
# Trade-off, accepted: github.com-side Copilot keeps only the root baseline.
