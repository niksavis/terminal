name: codex
enabled: true
tone: terse_directive
# Higher than claude/copilot (8000): scoped fragments are inlined here for glob
# fidelity (architecture §7.4); Codex's real budget is project_doc_max_bytes (32 KiB).
max_size_warning: 12000
outputs:
  agents_baseline:
    path: AGENTS.md
    template: codex/agents_md.j2
    filter:
      applies_to: [all]
