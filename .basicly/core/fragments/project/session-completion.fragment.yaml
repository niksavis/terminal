# yaml-language-server: $schema=../../schemas/fragment.schema.json
schema_version: 1
id: session-completion
description: What "done" requires before ending a turn or session.
category: project
priority: medium
applies_to:
- all
tags:
- completion
- handoff
status: active
body: |
  - Leave the repo in a state a fresh session could pick up cleanly: no partial edits, no stray debug output, no unexplained changes.
  - Summarize what changed, what was verified, and what — if anything — remains open before ending the turn.
