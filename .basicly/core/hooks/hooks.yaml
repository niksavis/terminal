# Manifest of catalog hook scripts, described independently of any hook
# manager. `basicly hooks-build` renders these into each manager's native
# config: `manager: git` (the default) goes to pre-commit's config,
# `manager: claude` goes to the agent-hook section of .claude/settings.json,
# and `manager: copilot` goes to a managed .github/hooks/basicly-<id>.json.
# The fields stay tool-agnostic so another manager (e.g. lefthook) can be
# projected later. See docs/architecture.md §4.2, §11.6.
hooks:
  - id: identity-guard
    script: identity-guard.py
    stage: pre-commit
    always_run: true
    pass_filenames: false
  - id: pre-commit-script
    script: pre-commit.py
    stage: pre-commit
    always_run: true
    pass_filenames: false
  - id: catalog-lint
    script: catalog-lint.py
    stage: pre-commit
    always_run: true
    pass_filenames: false
  - id: secret-scan
    script: secret-scan.py
    stage: pre-commit
    always_run: true
    pass_filenames: false
  - id: commit-msg-script
    script: commit-msg.py
    stage: commit-msg
    pass_filenames: true
  - id: beads-commit-msg-script
    script: beads-commit-msg.py
    stage: commit-msg
    pass_filenames: true
  - id: pre-push-script
    script: pre-push.py
    stage: pre-push
    always_run: true
    pass_filenames: false
  - id: protect-generated
    script: protect-generated.py
    stage: pretooluse
    manager: claude
  # Deterministic, agent-independent commit-time backstop for the fail-open,
  # Claude-only protect-generated PreToolUse guard (basicly-yw28): blocks a
  # commit that stages a generated output whose content diverges from the
  # projection manifest.
  - id: protect-generated-commit
    script: protect-generated-commit.py
    stage: pre-commit
    always_run: true
    pass_filenames: false
  # Token-free tool-usage telemetry: counts pipeline heads of every executed
  # shell command and every Skill invocation into the self-ignored
  # .basicly/usage/tool-usage.json.
  - id: tool-usage
    script: tool-usage.py
    stage: posttooluse
    manager: claude
    matcher: Bash|Skill
  - id: tool-usage-copilot
    script: tool-usage.py
    stage: posttooluse
    manager: copilot
