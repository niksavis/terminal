# Starship prompt configuration.
# Inspired by https://github.com/josean-dev/dev-environment-files
# This file is generated by terminal-setup; edit the template in the repo.

format = """
$username$hostname$directory$git_branch$git_status$cmd_duration $character"""

palette = "tokyonight_night"

[palettes.tokyonight_night]
fg = "#c0caf5"
cyan = "#7dcfff"
blue = "#7aa2f7"
green = "#9ece6a"
yellow = "#e0af68"
red = "#f7768e"
magenta = "#bb9af7"
grey = "#565f89"

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"
vimcmd_symbol = "[<](blue)"

[directory]
truncation_length = 3
truncate_to_repo = true
home_symbol = "~"
style = "bold blue"
# Explicit format avoids a trailing space that the default directory format
# adds in some Starship versions, which would create double spacing before
# the git branch segment.
format = "[$path]($style)[$read_only]($read_only_style)"

[cmd_duration]
min_time = 500
format = "[ took $duration](yellow)"

[git_branch]
symbol = ""
format = " [$symbol $branch]($style)"
style = "fg:magenta"

[git_status]
format = " [$all_status$ahead_behind]($style)"
style = "fg:grey"
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[jobs]
symbol = "✦"
format = " [$symbol$number]($style)"
style = "bold red"
threshold = 1
