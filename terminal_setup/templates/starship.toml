# Starship prompt configuration.
# Inspired by https://github.com/josean-dev/dev-environment-files
# This file is generated by terminal-setup; edit the template in the repo.

format = """
$username$hostname$directory$git_branch$git_status$git_state$git_metrics$docker_context$kubernetes$python$nodejs$rust$golang$cmd_duration$jobs$status $character"""

scan_timeout = 30
command_timeout = 500

palette = "tokyonight_night"

[palettes.tokyonight_night]
fg = "#c0caf5"
cyan = "#7dcfff"
blue = "#7aa2f7"
green = "#9ece6a"
yellow = "#e0af68"
red = "#f7768e"
magenta = "#bb9af7"
grey = "#565f89"

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"
vimcmd_symbol = "[<](blue)"

[directory]
truncation_length = 3
truncate_to_repo = true
home_symbol = "~"
style = "bold blue"
# Explicit format avoids a trailing space that the default directory format
# adds in some Starship versions, which would create double spacing before
# the git branch segment.
format = "[$path]($style)[$read_only]($read_only_style)"

[cmd_duration]
min_time = 500
format = "[ took $duration](yellow)"

[git_branch]
symbol = ""
format = " [$symbol $branch]($style)"
style = "fg:magenta"

[git_status]
format = " [$all_status$ahead_behind]($style)"
style = "fg:grey"
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[git_state]
format = " [$state( $progress_current/$progress_total)]($style)"
style = "fg:yellow"

[git_metrics]
disabled = false
added_style = "fg:green"
deleted_style = "fg:red"
format = " [+$added]($added_style)[-$deleted]($deleted_style)"

[docker_context]
format = " [docker:$context]($style)"
style = "fg:cyan"

[kubernetes]
# Show the kubectl context only inside Kubernetes-related directories so the
# prompt does not imply a cluster connection everywhere.
disabled = false
format = " [k8s:$context(\\($namespace\\))]($style)"
style = "fg:cyan"
detect_files = ["k8s.yaml", "skaffold.yaml", "helmfile.yaml", "Chart.yaml", "kustomization.yaml"]
detect_folders = ["k8s", "kubernetes", "helm", "manifests"]

[python]
format = " [py:$version(\\($virtualenv\\))]($style)"
style = "fg:green"

[nodejs]
format = " [node:$version]($style)"
style = "fg:blue"

[rust]
format = " [rs:$version]($style)"
style = "fg:red"

[golang]
format = " [go:$version]($style)"
style = "fg:cyan"

[jobs]
symbol = "✦"
format = " [$symbol$number]($style)"
style = "bold red"
threshold = 1

[status]
disabled = false
format = " [exit:$status]($style)"
style = "bold red"
map_symbol = true
recognize_signal_code = true
pipestatus = true
