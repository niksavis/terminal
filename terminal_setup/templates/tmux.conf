# tmux configuration for persistent long-running sessions.
# Inspired by https://github.com/josean-dev/dev-environment-files
# This file is generated by terminal-setup; edit the template in the repo.

# Prefix: Ctrl+Space. It works in every host terminal, keeps Ctrl+A free for
# readline beginning-of-line, and keeps Ctrl+B free for Claude Code. The
# deployed WezTerm leader is Ctrl+Shift+Space, so the prefix passes through.
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

# Indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Terminal capabilities
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# History and performance
set -g history-limit 100000
set -sg escape-time 10
set -g repeat-time 500

# Mouse and keys
set -g mouse on
set -s extended-keys on
set-window-option -g mode-keys vi

# Pane splitting (josean-dev style)
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style). Root-table Ctrl+h/j/k/l bindings are avoided
# on purpose: they would steal Ctrl+L (clear, Claude Code) from pane programs.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (Shift+letter, repeatable)
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r H resize-pane -L 5
bind -r m resize-pane -Z

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# Copy mode (vim-style)
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# Session management
bind M-c attach-session -c "#{pane_current_path}"

# Status bar
set -g status-interval 5
set -g status-left-length 40
set -g status-right "#H %Y-%m-%d %H:%M"

# Window notifications
setw -g monitor-activity on
set -g visual-activity off

# TPM and plugins (install tpm manually, then press prefix + I).
# vim-tmux-navigator is deliberately absent: it grabs root-table Ctrl+h/j/k/l,
# which breaks Ctrl+L clear in shells and Claude Code.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
